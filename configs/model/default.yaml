gbm:
  type: "lightgbm"
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 7
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  n_jobs: -1
  verbose: -1
  early_stopping_rounds: 50

deep:
  type: "ft_transformer"
  d_token: 192
  n_blocks: 3
  attention_n_heads: 8
  attention_dropout: 0.2
  ffn_d_hidden: 256
  ffn_dropout: 0.1
  residual_dropout: 0.0
  activation: "reglu"
  prenormalization: true
  kv_compression: null
  kv_compression_sharing: null

cvae:
  type: "cvae"
  latent_dim: 32
  encoder_hidden: [256, 128]
  decoder_hidden: [128, 256]
  condition_dim: 64
  beta: 1.0
  curve_points: 50

ensemble:
  weights:
    gbm: 0.35
    deep: 0.40
    cvae: 0.25
  use_stacking: false
